kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dev

networking:
  apiServerAddress: "127.0.0.1"

# Registry mirrors are configured by setup.sh via 'docker exec' after cluster
# creation (containerd v2 hosts.toml approach) — see setup.sh configure_mirrors().

nodes:
  - role: control-plane
    # Latest stable Kubernetes image — update the tag as new versions are released.
    # Browse available tags: https://hub.docker.com/r/kindest/node/tags
    image: kindest/node:v1.35.0
    extraPortMappings:
      # Istio ingress gateway — NodePort service (handles both Ingress and HTTPRoute)
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock

  - role: worker
    image: kindest/node:v1.35.0
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock

  - role: worker
    image: kindest/node:v1.35.0
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
