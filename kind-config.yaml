kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dev

networking:
  apiServerAddress: "127.0.0.1"

# Registry mirrors are configured by setup.sh via 'docker exec' after cluster
# creation (containerd v2 hosts.toml approach) — see setup.sh configure_mirrors().

nodes:
  - role: control-plane
    # Latest stable Kubernetes image — update the tag as new versions are released.
    # Browse available tags: https://hub.docker.com/r/kindest/node/tags
    image: kindest/node:v1.35.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # nginx ingress controller — binds directly to node hostPorts
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Istio ingress gateway — NodePort service on these ports
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner

  - role: worker
    image: kindest/node:v1.35.0
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner

  - role: worker
    image: kindest/node:v1.35.0
    extraMounts:
      - hostPath: /var/local-path-provisioner
        containerPath: /var/local-path-provisioner
